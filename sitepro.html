<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SitePro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-text: #085041;
    --amber: #EF9F27;
    --amber-light: #FAEEDA;
    --amber-text: #854F0B;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-text: #A32D2D;
    --bg: #F7F6F3;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text: #1A1A1A;
    --text-2: #666;
    --text-3: #999;
    --radius: 10px;
    --radius-lg: 14px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* AUTH */
  #auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 380px; }
  .auth-logo { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .auth-logo span { color: var(--green); }
  .auth-sub { font-size: 13px; color: var(--text-2); margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 9px; font-size: 13px; font-weight: 500; border: none; background: transparent; cursor: pointer; color: var(--text-2); font-family: inherit; transition: all 0.15s; }
  .auth-tab.active { background: var(--green); color: #fff; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border-md); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; outline: none; transition: border 0.15s; }
  .field input:focus { border-color: var(--green); }
  .field select { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border-md); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
  .btn-primary { width: 100%; padding: 11px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .auth-error { font-size: 12px; color: var(--red-text); background: var(--red-light); padding: 8px 12px; border-radius: var(--radius); margin-bottom: 14px; display: none; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 16px; font-weight: 600; color: var(--text); }
  .topbar-logo span { color: var(--green); }
  .topbar-role { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; margin-left: 4px; }
  .role-admin { background: var(--green-light); color: var(--green-text); }
  .role-empresa { background: var(--amber-light); color: var(--amber-text); }
  .topbar-spacer { flex: 1; }
  .topbar-user { font-size: 13px; color: var(--text-2); }
  .btn-logout { font-size: 12px; padding: 6px 12px; border: 1px solid var(--border-md); border-radius: var(--radius); background: transparent; cursor: pointer; color: var(--text-2); font-family: inherit; }
  .btn-logout:hover { background: var(--bg); }

  /* NAV */
  .nav-tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 20px; overflow-x: auto; }
  .nav-tab { padding: 14px 16px; font-size: 13px; font-weight: 500; color: var(--text-2); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .nav-tab:hover:not(.active) { color: var(--text); }

  /* CONTENT */
  .content { flex: 1; padding: 24px 20px; max-width: 860px; margin: 0 auto; width: 100%; }
  .page { display: none; }
  .page.active { display: block; }

  /* CARDS */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .metric-label { font-size: 11px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .metric-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .metric-sub { font-size: 12px; color: var(--green); margin-top: 2px; }

  /* SECTION */
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }

  /* LIST */
  .list-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 24px; }
  .list-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: var(--bg); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .list-info { flex: 1; min-width: 0; }
  .list-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .list-sub { font-size: 12px; color: var(--text-2); margin-top: 1px; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
  .badge-live { background: #EAF3DE; color: #3B6D11; }
  .badge-building { background: var(--amber-light); color: var(--amber-text); }
  .badge-bug { background: var(--red-light); color: var(--red-text); }

  /* AI BOX */
  .ai-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 24px; }
  .ai-header { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .ai-title { font-size: 14px; font-weight: 500; }
  .ai-model { font-size: 11px; color: var(--text-3); margin-left: auto; font-family: 'DM Mono', monospace; }
  .ai-msgs { padding: 16px; min-height: 140px; max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .msg-bubble { font-size: 13px; line-height: 1.55; padding: 10px 13px; border-radius: var(--radius); max-width: 88%; }
  .msg-bubble.user { background: var(--green); color: #fff; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg-bubble.ai { background: var(--bg); color: var(--text); align-self: flex-start; border-bottom-left-radius: 3px; border: 1px solid var(--border); }
  .ai-footer { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
  .ai-input { flex: 1; padding: 9px 12px; font-size: 13px; border: 1px solid var(--border-md); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; outline: none; }
  .ai-input:focus { border-color: var(--green); }
  .btn-send { padding: 9px 18px; background: var(--green); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .btn-send:hover { background: var(--green-dark); }
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--text-3); animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2}40%{opacity:1} }

  /* MESSAGES */
  .msg-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .msg-item:last-child { border-bottom: none; }
  .msg-icon { width: 34px; height: 34px; border-radius: var(--radius); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; border: 1px solid var(--border); }
  .msg-body { flex: 1; }
  .msg-from { font-size: 13px; font-weight: 500; color: var(--text); }
  .msg-text { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .msg-time { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  .unread-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); margin-top: 5px; flex-shrink: 0; }

  /* STATUS */
  .status-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
  .status-url { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--green); margin-bottom: 10px; }
  .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #639922; }
  .status-name { font-size: 15px; font-weight: 500; }
  .status-updated { font-size: 12px; color: var(--text-3); }

  /* REPORT */
  .report-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
  .report-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
  textarea { width: 100%; padding: 10px 12px; font-size: 13px; border: 1px solid var(--border-md); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; resize: none; height: 90px; outline: none; }
  textarea:focus { border-color: var(--green); }
  .btn-outline { padding: 9px 20px; background: transparent; border: 1px solid var(--border-md); border-radius: var(--radius); font-size: 13px; color: var(--text); cursor: pointer; font-family: inherit; margin-top: 10px; }
  .btn-outline:hover { background: var(--bg); }
  .success-msg { font-size: 13px; color: #3B6D11; background: #EAF3DE; padding: 8px 12px; border-radius: var(--radius); margin-top: 10px; display: none; }

  /* ADD CLIENT FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 24px; }
  .form-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

  /* SITE PREVIEW */
  .site-preview { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .site-hero { background: var(--green); padding: 28px 20px; text-align: center; color: #fff; }
  .site-hero-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .site-hero-tag { font-size: 13px; opacity: 0.85; }
  .site-nav { display: flex; border-bottom: 1px solid var(--border); }
  .site-nav-item { flex: 1; text-align: center; padding: 12px; font-size: 13px; color: var(--text-2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .site-nav-item.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
  .site-body { padding: 20px; }
  .menu-cat { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; margin-top: 16px; }
  .menu-cat:first-child { margin-top: 0; }
  .menu-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; background: var(--bg); border-radius: var(--radius); margin-bottom: 8px; }
  .menu-emoji { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
  .menu-info { flex: 1; }
  .menu-name { font-size: 14px; font-weight: 500; }
  .menu-desc { font-size: 12px; color: var(--text-2); margin-top: 1px; }
  .menu-price { font-size: 14px; font-weight: 600; color: var(--green); }

  /* LOADING */
  #loading { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .loading-logo { font-size: 20px; font-weight: 600; color: var(--text); }
  .loading-logo span { color: var(--green); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--text-3); font-size: 14px; }
</style>
</head>
<body>

<div id="loading"><div class="loading-logo">Site<span>Pro</span></div></div>

<!-- AUTH -->
<div id="auth-screen" style="display:none;">
  <div class="auth-card">
    <div class="auth-logo">Site<span>Pro</span></div>
    <div class="auth-sub">Plataforma de sites para restaurantes</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Criar conta</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
    <div id="login-form">
      <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" /></div>
      <div class="field"><label>Senha</label><input type="password" id="login-password" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doLogin()">Entrar</button>
    </div>
    <div id="register-form" style="display:none;">
      <div class="field"><label>Nome</label><input type="text" id="reg-name" placeholder="Seu nome" /></div>
      <div class="field"><label>E-mail</label><input type="email" id="reg-email" placeholder="seu@email.com" /></div>
      <div class="field"><label>Senha</label><input type="password" id="reg-password" placeholder="mínimo 6 caracteres" /></div>
      <div class="field"><label>Tipo de conta</label>
        <select id="reg-role">
          <option value="empresa">Dono de restaurante</option>
        </select>
      </div>
      <button class="btn-primary" onclick="doRegister()">Criar conta</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Site<span>Pro</span></div>
    <span id="role-badge" class="topbar-role"></span>
    <div class="topbar-spacer"></div>
    <span class="topbar-user" id="user-email-display"></span>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div class="content" id="main-content"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where, orderBy, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBdey2OxOYgcaaLhjHgJsYKkeBYIzJhBcE",
  authDomain: "sitepro-davi.firebaseapp.com",
  projectId: "sitepro-davi",
  storageBucket: "sitepro-davi.firebasestorage.app",
  messagingSenderId: "454602466209",
  appId: "1:454602466209:web:964382863c69ef000a21e0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ADMIN EMAIL — só este email tem acesso admin
const ADMIN_EMAIL = "davi.yoneshige@gmail.com"; // TROCA PARA O SEU EMAIL

let currentUser = null;
let currentRole = null;
let currentUserData = null;

// ─── AUTH STATE ───────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading').style.display = 'none';
  if (user) {
    currentUser = user;
    if (user.email === ADMIN_EMAIL) {
      currentRole = 'admin';
      currentUserData = { name: 'Admin', role: 'admin' };
    } else {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) {
        currentUserData = snap.data();
        currentRole = currentUserData.role;
      } else {
        currentRole = 'empresa';
        currentUserData = { name: user.email, role: 'empresa' };
      }
    }
    showApp();
  } else {
    currentUser = null;
    currentRole = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ─── AUTH FUNCTIONS ───────────────────────────────────
window.switchAuthTab = (tab) => {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-form').style.display = tab==='login'?'block':'none';
  document.getElementById('register-form').style.display = tab==='register'?'block':'none';
  document.getElementById('auth-error').style.display = 'none';
};

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('auth-error');
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = 'E-mail ou senha incorretos.';
    err.style.display = 'block';
  }
};

window.doRegister = async () => {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const role = document.getElementById('reg-role').value;
  const err = document.getElementById('auth-error');
  err.style.display = 'none';
  if (!name || !email || !pass) { err.textContent = 'Preencha todos os campos.'; err.style.display='block'; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db, 'users', cred.user.uid), { name, email, role, createdAt: serverTimestamp() });
  } catch(e) {
    err.textContent = e.code === 'auth/email-already-in-use' ? 'E-mail já cadastrado.' : 'Erro ao criar conta.';
    err.style.display = 'block';
  }
};

window.doLogout = async () => {
  await signOut(auth);
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
};

// ─── APP SHELL ────────────────────────────────────────
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  const appEl = document.getElementById('app');
  appEl.style.display = 'flex';
  document.getElementById('user-email-display').textContent = currentUserData?.name || currentUser.email;
  const badge = document.getElementById('role-badge');
  if (currentRole === 'admin') { badge.textContent = 'Admin'; badge.className = 'topbar-role role-admin'; }
  else { badge.textContent = 'Restaurante'; badge.className = 'topbar-role role-empresa'; }
  buildNav();
}

function buildNav() {
  const nav = document.getElementById('nav-tabs');
  const content = document.getElementById('main-content');
  let tabs = [];
  if (currentRole === 'admin') {
    tabs = [
      { id: 'dashboard', label: 'Dashboard', render: renderAdminDashboard },
      { id: 'clientes', label: 'Clientes', render: renderClientes },
      { id: 'mensagens', label: 'Mensagens', render: renderMensagensAdmin },
      { id: 'ia', label: 'IA Dev', render: renderIA },
    ];
  } else {
    tabs = [
      { id: 'meusite', label: 'Meu site', render: renderMeuSite },
      { id: 'contato', label: 'Falar com dev', render: renderContato },
    ];
  }
  nav.innerHTML = tabs.map((t,i) => `<div class="nav-tab${i===0?' active':''}" onclick="switchTab('${t.id}')" id="tab-btn-${t.id}">${t.label}</div>`).join('');
  content.innerHTML = tabs.map(t => `<div class="page" id="page-${t.id}"></div>`).join('');
  window._tabs = tabs;
  window.switchTab = (id) => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-btn-'+id)?.classList.add('active');
    const page = document.getElementById('page-'+id);
    page.classList.add('active');
    const tab = tabs.find(t=>t.id===id);
    if (tab && page.innerHTML === '') tab.render(page);
  };
  tabs[0].render(document.getElementById('page-'+tabs[0].id));
  document.getElementById('page-'+tabs[0].id).classList.add('active');
}

// ─── ADMIN: DASHBOARD ────────────────────────────────
async function renderAdminDashboard(el) {
  el.innerHTML = `<div class="metrics" id="dash-metrics"><div class="metric"><div class="metric-label">Carregando</div><div class="metric-value">...</div></div></div>`;
  const snap = await getDocs(collection(db, 'users'));
  const empresas = snap.docs.filter(d => d.data().role === 'empresa');
  const msgsSnap = await getDocs(collection(db, 'mensagens'));
  const naoLidas = msgsSnap.docs.filter(d => !d.data().lida).length;
  document.getElementById('dash-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Clientes</div><div class="metric-value">${empresas.length}</div></div>
    <div class="metric"><div class="metric-label">Mensagens</div><div class="metric-value">${msgsSnap.size}</div><div class="metric-sub">${naoLidas} não lidas</div></div>
    <div class="metric"><div class="metric-label">Sites ativos</div><div class="metric-value">${empresas.length}</div></div>
  `;
}

// ─── ADMIN: CLIENTES ─────────────────────────────────
async function renderClientes(el) {
  el.innerHTML = `
    <div class="form-card">
      <div class="form-title">Adicionar novo cliente</div>
      <div class="form-grid">
        <div class="field"><label>Nome do restaurante</label><input type="text" id="new-nome" placeholder="Burger do João" /></div>
        <div class="field"><label>Tipo</label><input type="text" id="new-tipo" placeholder="Lanchonete, Pizzaria..." /></div>
        <div class="field"><label>Cidade</label><input type="text" id="new-cidade" placeholder="Santo André" /></div>
        <div class="field"><label>Status</label>
          <select id="new-status"><option value="building">Em construção</option><option value="live">No ar</option></select>
        </div>
      </div>
      <button class="btn-primary" style="margin-top:4px;width:auto;padding:9px 24px;" onclick="addCliente()">Adicionar cliente</button>
      <div class="success-msg" id="cliente-success">Cliente adicionado!</div>
    </div>
    <div class="section-label">Clientes cadastrados</div>
    <div class="list-card" id="clientes-list"><div class="empty">Carregando...</div></div>
  `;
  await loadClientes();

  window.addCliente = async () => {
    const nome = document.getElementById('new-nome').value.trim();
    const tipo = document.getElementById('new-tipo').value.trim();
    const cidade = document.getElementById('new-cidade').value.trim();
    const status = document.getElementById('new-status').value;
    if (!nome) return;
    await addDoc(collection(db, 'clientes'), { nome, tipo, cidade, status, criadoEm: serverTimestamp() });
    document.getElementById('new-nome').value='';
    document.getElementById('new-tipo').value='';
    document.getElementById('new-cidade').value='';
    const s = document.getElementById('cliente-success');
    s.style.display='block';
    setTimeout(()=>s.style.display='none',2500);
    await loadClientes();
  };
}

async function loadClientes() {
  const snap = await getDocs(collection(db, 'clientes'));
  const el = document.getElementById('clientes-list');
  if (!el) return;
  if (snap.empty) { el.innerHTML = '<div class="empty">Nenhum cliente ainda.</div>'; return; }
  const colors = ['#E1F5EE;color:#0F6E56','#FAEEDA;color:#854F0B','#E6F1FB;color:#185FA5','#FCEBEB;color:#A32D2D'];
  el.innerHTML = snap.docs.map((d,i) => {
    const c = d.data();
    const initials = c.nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const col = colors[i % colors.length];
    const badge = c.status==='live' ? '<span class="badge badge-live">no ar</span>' : '<span class="badge badge-building">em construção</span>';
    return `<div class="list-row"><div class="avatar" style="background:${col.split(';')[0].replace('background:','')};${col.split(';')[1]}">${initials}</div><div class="list-info"><div class="list-name">${c.nome}</div><div class="list-sub">${c.tipo||''} · ${c.cidade||''}</div></div>${badge}</div>`;
  }).join('');
}

// ─── ADMIN: MENSAGENS ────────────────────────────────
async function renderMensagensAdmin(el) {
  el.innerHTML = `<div class="section-label">Mensagens dos clientes</div><div class="list-card" id="msgs-admin-list"><div class="empty">Carregando...</div></div>`;
  const snap = await getDocs(query(collection(db, 'mensagens'), orderBy('criadoEm', 'desc')));
  const listEl = document.getElementById('msgs-admin-list');
  if (snap.empty) { listEl.innerHTML='<div class="empty">Nenhuma mensagem ainda.</div>'; return; }
  listEl.innerHTML = snap.docs.map(d => {
    const m = d.data();
    const dt = m.criadoEm?.toDate ? m.criadoEm.toDate().toLocaleDateString('pt-BR') : 'agora';
    return `<div class="msg-item"><div class="msg-icon">✉️</div><div class="msg-body"><div class="msg-from">${m.nomeEmpresa||m.email||'Cliente'}</div><div class="msg-text">${m.texto}</div><div class="msg-time">${dt}</div></div>${!m.lida?'<div class="unread-dot"></div>':''}</div>`;
  }).join('');
}

// ─── ADMIN: IA ───────────────────────────────────────
function renderIA(el) {
  el.innerHTML = `
    <div class="section-label">Assistente de desenvolvimento</div>
    <div class="ai-box">
      <div class="ai-header"><div class="ai-dot"></div><div class="ai-title">IA Dev</div><div class="ai-model">claude-sonnet</div></div>
      <div class="ai-msgs" id="ia-msgs">
        <div class="msg-bubble ai">Olá! Posso gerar código HTML para sites de restaurantes, criar cardápios, sugerir layouts e muito mais. O que você precisa?</div>
      </div>
      <div class="ai-footer">
        <input class="ai-input" id="ia-input" placeholder="Ex: Crie um cardápio para pizzaria italiana..." onkeydown="if(event.key==='Enter')sendIA()" />
        <button class="btn-send" onclick="sendIA()">Enviar</button>
      </div>
    </div>
  `;

  window.sendIA = async () => {
    const input = document.getElementById('ia-input');
    const msgs = document.getElementById('ia-msgs');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    msgs.innerHTML += `<div class="msg-bubble user">${text}</div>`;
    msgs.innerHTML += `<div class="msg-bubble ai" id="ia-typing"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.scrollTop = msgs.scrollHeight;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'Você é um assistente especializado em desenvolvimento de sites para restaurantes e lanchonetes brasileiras. Responda em português brasileiro de forma objetiva. Gere código HTML limpo quando solicitado, sugira conteúdo para cardápios, layouts e melhorias.',
          messages: [{ role: 'user', content: text }]
        })
      });
      const data = await res.json();
      document.getElementById('ia-typing')?.remove();
      const reply = data.content?.[0]?.text || 'Erro ao obter resposta.';
      msgs.innerHTML += `<div class="msg-bubble ai" style="white-space:pre-wrap;max-width:95%">${reply}</div>`;
    } catch(e) {
      document.getElementById('ia-typing')?.remove();
      msgs.innerHTML += `<div class="msg-bubble ai">Erro de conexão.</div>`;
    }
    msgs.scrollTop = msgs.scrollHeight;
  };
}

// ─── EMPRESA: CONTATO ────────────────────────────────
async function renderContato(el) {
  el.innerHTML = `
    <div class="section-label">Falar com o desenvolvedor</div>
    <div class="report-card">
      <div class="report-title">Encontrou um problema ou quer pedir uma alteração?</div>
      <textarea id="report-txt" placeholder="Descreva o que precisa..."></textarea>
      <button class="btn-outline" onclick="enviarMensagem()">Enviar mensagem</button>
      <div class="success-msg" id="report-ok">Mensagem enviada! O desenvolvedor responderá em breve.</div>
    </div>
    <div class="section-label" style="margin-top:24px;">Histórico</div>
    <div class="list-card" id="hist-list"><div class="empty">Carregando...</div></div>
  `;
  const snap = await getDocs(query(collection(db, 'mensagens'), where('uid', '==', currentUser.uid), orderBy('criadoEm', 'desc')));
  const histEl = document.getElementById('hist-list');
  if (snap.empty) { histEl.innerHTML='<div class="empty">Nenhuma mensagem enviada ainda.</div>'; }
  else {
    histEl.innerHTML = snap.docs.map(d => {
      const m = d.data();
      const dt = m.criadoEm?.toDate ? m.criadoEm.toDate().toLocaleDateString('pt-BR') : 'agora';
      return `<div class="msg-item"><div class="msg-icon">📝</div><div class="msg-body"><div class="msg-from">Você</div><div class="msg-text">${m.texto}</div><div class="msg-time">${dt}</div></div></div>`;
    }).join('');
  }

  window.enviarMensagem = async () => {
    const txt = document.getElementById('report-txt').value.trim();
    if (!txt) return;
    await addDoc(collection(db, 'mensagens'), {
      uid: currentUser.uid,
      email: currentUser.email,
      nomeEmpresa: currentUserData?.name || currentUser.email,
      texto: txt,
      lida: false,
      criadoEm: serverTimestamp()
    });
    document.getElementById('report-txt').value = '';
    const ok = document.getElementById('report-ok');
    ok.style.display='block';
    setTimeout(()=>ok.style.display='none',3000);
    await renderContato(el);
  };
}
